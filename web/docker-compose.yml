services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cami_de_cavalls
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cami_de_cavalls
      AUTH_SECRET: dev-secret-change-in-production
      AUTH_URL: http://localhost:3000
      ADMIN_EMAIL: admin@camidecavalls.com
      ADMIN_PASSWORD: changeme
    depends_on:
      - db

volumes:
  pgdata:
